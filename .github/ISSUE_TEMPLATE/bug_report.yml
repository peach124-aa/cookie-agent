name: Bug Report
description: File a bug report for the Cookie Agent project
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below to help us reproduce and resolve it.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g., Capture loop crashes when emulator window loses focus.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start emulator at 1280x720
        2. Run 'python scripts/collect_raw_dataset.py'
        3. Click 'Minimize' on emulator
        4. See error trace '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
      placeholder: e.g., The loop should log a warning and wait for the window to restore.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, emulator name, Python version, etc.
      placeholder: e.g., Windows 11, LDPlayer 9, Python 3.12.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Context
      description: Paste terminal outputs, tracebacks, or configuration details.
      render: shell
